<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Flex Layout</title>

    <style>
        * {
            font-family: "Vazir";
        }

        body {
            margin: 0;
            padding: 16px;
            background: #f6f7fb;
            direction: rtl;
        }

        fieldset {
            border: 1px solid #e1e3ea;
            background: #fff;
            border-radius: 14px;
            padding: 16px;
        }

        legend {
            padding: 6px 14px;
            background: #ff6b35;
            color: #fff;
            border-radius: 20px;
            font-weight: bold;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 16px;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            flex: 0 1 220px;
            max-width: 260px;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
            transition: 0.25s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 26px rgba(0, 0, 0, .12);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
        }

        .content {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .content h3 {
            margin: 0;
            font-size: 15px;
            color: #222;
            line-height: 1.4;
            height: 42px;
            overflow: hidden;
        }

        .content p {
            margin: 0;
            font-size: 13px;
            color: #666;
            height: 34px;
            overflow: hidden;
        }

        .price {
            font-size: 16px;
            font-weight: bold;
            color: #0a7cff;
            margin-top: auto;
        }

        .old-price {
            font-size: 13px;
            color: #999;
            text-decoration: line-through;
            margin-right: 6px;
        }

        .actions {
            padding: 12px 14px;
            border-top: 1px solid #f0f0f0;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: #ff6b35;
            color: #fff;
            transition: 0.2s;
        }

        .btn:hover {
            background: #912809;
        }
    </style>
</head>

<body>
    <fieldset>
        <legend>محصولات فروشگاهی</legend>
        <div class="products" id="ListProducts"></div>
    </fieldset>


    <script>
        function Load() {
            const MyRequest = new XMLHttpRequest();
            MyRequest.onloadstart = function () {
                document.getElementById("ListProducts").innerHTML = '<center> صبر کنید ... </center>';
            };
            MyRequest.onload = function () {
                var json = JSON.parse(this.responseText);

                var html = '';
                for (let index = 0; index < json.results.length; index++) {
                    const el = json.results[index];

                    html +=
                        `
                    
            <div class="product-card">
                <img src="`+ el.image_url + `">
                <div class="content">
                    <h3>`+ el.name1 + `</h3>
                    <p>`+ el.shop_text + `</p>
                    <span class="price">`+ (el.price_text.replace('از ', '')) + `</span>
                </div>
                <div class="actions">
                    <button class="btn">افزودن به سبد خرید</button>
                </div>
            </div>
                    
                    `;
                }

                document.getElementById("ListProducts").innerHTML = html;
            }
            MyRequest.open("GET", "https://api.torob.com/v4/base-product/search/?page=0&sort=popularity&size=24&category=230&category_name=%D9%85%D8%A7%D9%86%DB%8C%D8%AA%D9%88%D8%B1-monitor&brand=6&brand_name=lg-%D8%A7%D9%84-%D8%AC%DB%8C&_landing_page=browse_230&source=next_desktop");
            MyRequest.send();
        }

        window.onload = function () {
            Load();
        }
    </script>

</body>
</html>
